trigger:
- main

pool: k8s


stages:
  - stage: buildstsge
    jobs:
      - job: buildjob
        steps:
          - task: Docker@2
            inputs:
              containerRegistry: 'acr connection'
              repository: 'indexfile'
              command: 'buildAndPush'
              Dockerfile: '**/Dockerfile'
          - task: CopyFiles@2
            inputs:
              SourceFolder: 'manifests'
              Contents: '*.yaml'
              TargetFolder: '$(Build.ArtifactStagingDirectory)'

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'manifests'
              publishLocation: 'Container'
## Deploy stage
  - stage: deployStage
    jobs:
    - deployment: deploy 
      environment: dev
      strategy:
        runOnce:
          deploy:
            steps:
            - download: current
              artifact: manifests
            - task: KubernetesManifest@1 
              inputs:
                action: 'deploy'
                connectionType: 'kubernetesServiceConnection'
                kubernetesServiceConnection: 'k8s connection'
                namespace: 'default'
                manifests: '$(Pipeline.Workspace)/manifests/*.yaml'
                containers: 'himalay.azurecr.io/indexfile:$(Build.BuildId)'
        
          
